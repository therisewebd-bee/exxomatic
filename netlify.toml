[build]
  base = "frontend"
  command = "sed -i 's|VITE_API_URL|'\"$VITE_API_URL\"'|g' ../netlify.toml && npm install && npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "VITE_API_URL/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
