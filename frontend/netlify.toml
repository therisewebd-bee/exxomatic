[build]
  base = "frontend"
  command = "npm install && npm run build && echo '/api/* https://base.exxomatic.live/api/:splat 200!' > dist/_redirects && echo '/* /index.html 200' >> dist/_redirects"
  publish = "dist"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_API_URL"
