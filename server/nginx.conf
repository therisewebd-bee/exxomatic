worker_processes auto;

events {
    worker_connections 1024;
}

# ─── TCP Passthrough for IoT Devices (port 5000) ──────────────
stream {
    server {
        listen 5000;
        proxy_pass app:5000;
    }
}

# ─── HTTP / HTTPS Reverse Proxy ───────────────────────────────
http {
    upstream app_backend {
        server app:3000;
        keepalive 64;
    }

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    # Buffer tuning
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    # ─── Port 80: ACME challenge + redirect to HTTPS ──────────
    server {
        listen 80;
        server_name codeczero-test.duckdns.org;

        # Certbot ACME challenge (must stay on port 80)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check (for Docker healthcheck on port 80)
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── Port 443: SSL + Reverse Proxy + WebSocket ────────────
    server {
        listen 443 ssl;
        server_name codeczero-test.duckdns.org;

        # SSL certificates (Let's Encrypt via Certbot)
        ssl_certificate     /etc/letsencrypt/live/codeczero-test.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/codeczero-test.duckdns.org/privkey.pem;

        # SSL hardening
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1h;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ─── API + WebSocket ──────────────────────────────────
        location / {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://app_backend;
            proxy_http_version 1.1;

            # WebSocket support (CRITICAL for wss://)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Forwarded headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts (86400s = 24h for long-lived WebSocket)
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    86400s;
        }
    }
}
