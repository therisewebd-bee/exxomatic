
services:
  # ─── Fleet Tracker Node.js Server ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleet-tracker-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-}
      PORT: ${PORT:-3000}
      TCP_PORT: ${TCP_PORT:-5000}
      JWT_SECRET: ${JWT_SECRET:-your-default-secret-key}
    ports:
      - "3000:3000"           # Web API (External)
      - "5000:5000"           # IoT Device Data (External)
    volumes:
      - app_logs:/app/logs
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - fleet-network

  # ─── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fleet-tracker-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"               # HTTP / WebSocket
      - "443:443"             # HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - fleet-network

  # ─── Certbot for SSL ───────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: fleet-tracker-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: certonly --webroot --webroot-path /var/www/certbot/ --email ankitmahardev@gmail.com --agree-tos --no-eff-email --force-renewal
    networks:
      - fleet-network

# ─── Volumes ───────────────────────────────────────────────────
volumes:
  app_logs:
    driver: local

# ─── Networks ──────────────────────────────────────────────────
networks:
  fleet-network:
    driver: bridge
