version: "3.9"

services:
  # ─── Fleet Tracker Node.js Server ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleet-tracker-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      TCP_PORT: ${TCP_PORT:-5000}
      HTTP_PORT: ${HTTP_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    volumes:
      - app_logs:/app/logs
    networks:
      - fleet-network

  # ─── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fleet-tracker-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"               # HTTP / WebSocket
      - "443:443"             # HTTPS (when TLS is configured)
      - "5000:5000"           # TCP passthrough for device telemetry
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment below when you have TLS certs:
      # - ./certs/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      # - ./certs/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - fleet-network

# ─── Volumes ───────────────────────────────────────────────────
volumes:
  app_logs:
    driver: local

# ─── Networks ──────────────────────────────────────────────────
networks:
  fleet-network:
    driver: bridge
